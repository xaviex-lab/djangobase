{% extends 'cadastro/base.html' %}

{% block titulo %}Editar {{ pessoa.nome }}{% endblock %}

{% block conteudo %}
    <h2>Editar {{ pessoa.nome }}</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
        <a href="{% url 'detalhe' pessoa.id %}">Cancelar</a>
    </form>
{% endblock %}
