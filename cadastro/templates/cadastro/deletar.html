{# cadastro\templates\cadastro\deletar.html #}

{% extends 'cadastro/base.html' %}

{% block titulo %}Deletar {{ pessoa.nome }}{% endblock %}

{% block conteudo %}
    <h2>Deletar {{ pessoa.nome }}?</h2>
    <p>Essa ação não pode ser desfeita!</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Confirmar</button>
        <a href="{% url 'detalhe' pessoa.id %}">Cancelar</a>
    </form>
{% endblock %}
